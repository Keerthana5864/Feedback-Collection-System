<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Register - Feedback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="phone-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <div class="status-bar">
                <span class="status-time">9:41</span>
                <div class="status-icons">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
                        <rect x="0" y="3" width="3" height="9" rx="1" />
                        <rect x="4.5" y="1.5" width="3" height="10.5" rx="1" />
                        <rect x="9" y="0" width="3" height="12" rx="1" />
                    </svg>
                    <svg width="16" height="12" viewBox="0 0 24 12" fill="currentColor">
                        <rect x="0" y="1" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"
                            fill="none" />
                        <rect x="1.5" y="2.5" width="14" height="7" rx="1" />
                        <rect x="21" y="4" width="2" height="4" rx="1" />
                    </svg>
                </div>
            </div>
            <div class="app-scroll">
                <div class="app-inner">
                    <div class="container">
                        <div class="app-logo">
                            <div class="app-logo-icon">
                                <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
                                    <polygon points="22,10 36,17 22,24 8,17" fill="white" opacity="0.95" />
                                    <rect x="19" y="24" width="6" height="2" rx="1" fill="white" opacity="0.8" />
                                    <path d="M12 18.5v6c0 2.5 4.5 5 10 5s10-2.5 10-5v-6" stroke="white" stroke-width="2"
                                        fill="none" stroke-linecap="round" />
                                    <circle cx="33" cy="33" r="7" fill="#fbbf24" />
                                    <path d="M33 28.5l1.2 3.6h3.8l-3 2.2 1.1 3.4-3.1-2.2-3.1 2.2 1.1-3.4-3-2.2h3.8z"
                                        fill="white" />
                                </svg>
                            </div>
                            <div>
                                <div class="app-logo-name">Faculty Feedback</div>
                                <div
                                    style="font-size:0.6rem;color:#94a3b8;text-align:center;letter-spacing:0.06em;text-transform:uppercase;">
                                    Rating System</div>
                            </div>
                        </div>

                        <h1>Create Account</h1>
                        <p class="subtitle">Join the feedback community</p>

                        <form id="registerForm">
                            <div class="form-group">
                                <label for="institution_id">Institution ID</label>
                                <input type="number" id="institution_id" required placeholder="Enter school id">
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" required placeholder="name@example.com"
                                    autocomplete="email">
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <div style="position:relative;">
                                    <input type="password" id="password" required placeholder="Min. 6 characters"
                                        autocomplete="new-password">
                                    <button type="button" onclick="togglePwd()"
                                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;width:30px;height:30px;min-height:unset;padding:0;box-shadow:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;">👁</button>
                                </div>
                            </div>
                            <button type="submit" id="regBtn" style="margin-top:0.5rem;">Create Account</button>
                        </form>

                        <div class="auth-links">
                            <p>Already have an account? <a href="index.html">Sign In</a></p>
                        </div>
                        <div id="statusMsg" class="hidden"
                            style="margin-top:1rem;text-align:center;padding:0.7rem;border-radius:10px;font-size:0.85rem;font-weight:500;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="phone-label">
        <div class="phone-label-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2" />
            </svg>
            Mobile App
        </div>
        <h2>Create<br>Your<br>Account</h2>
        <p>Register as a student to submit feedback, or as an admin to view the dashboard.</p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = event.currentTarget;
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            btn.textContent = pwd.type === 'password' ? '👁' : '🙈';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const statusMsg = document.getElementById('statusMsg');
            btn.disabled = true; btn.innerText = 'Creating account...';
            statusMsg.classList.add('hidden');
            const data = {
                institution_id: document.getElementById('institution_id').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: 'student'  // Only students can self-register
            };
            const result = await API.register(data);
            if (result.status === 'success') {
                statusMsg.innerText = '✅ Account created! Redirecting...';
                statusMsg.style.color = '#10b981'; statusMsg.style.background = '#ecfdf5';
                statusMsg.classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                statusMsg.innerText = result.message;
                statusMsg.style.color = '#ef4444'; statusMsg.style.background = '#fef2f2';
                statusMsg.classList.remove('hidden');
                btn.disabled = false; btn.innerText = 'Create Account';
            }
        });
    </script>
</body>

</html>
