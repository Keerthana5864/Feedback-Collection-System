<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Sign Up - Faculty Feedback</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <style>
        .signup-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
            background: var(--bg-main);
            color: var(--text-main);
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="phone-shell">
        <div class="phone-screen" style="background: var(--phone-screen-bg); display: block; overflow-y: auto;">
            <div class="signup-container">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h1 style="font-size: 1.75rem; color: var(--text-main);">Register Institution</h1>
                    <p style="color: var(--text-muted);">Onboard your school to start collecting student feedback.</p>
                </div>

                <form id="instSignupForm">
                    <div class="form-group">
                        <label>Institution Name</label>
                        <input type="text" id="instName" placeholder="e.g. Stanford University" required>
                    </div>
                    <div class="form-group">
                        <label>Admin Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@school.edu" required>
                    </div>
                    <div class="form-group">
                        <label>Admin Password</label>
                        <input type="password" id="adminPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" id="submitBtn">Create Platform</button>
                </form>

                <div class="back-link">
                    <a href="index.html">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('instSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Creating...';
            btn.disabled = true;

            const data = {
                name: document.getElementById('instName').value,
                admin_email: document.getElementById('adminEmail').value,
                admin_password: document.getElementById('adminPassword').value
            };

            const result = await API.registerInstitution(data);
            if (result.status === 'success') {
                const instId = result.institution.id;
                const msg = `Success!\n\nYour Institution ID is: ${instId}\n\nIMPORTANT: Use this ID to log in and share it with your students.\n\nRedirecting to login...`;
                alert(msg);
                window.location.href = 'index.html';
            } else {
                alert('Error: ' + result.message);
                btn.innerText = 'Create Platform';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
